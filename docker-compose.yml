# Livora Cart — full local infrastructure stack.
# One command: `make up`. Runtime-verified on the Ubuntu host (see deploy/).
#
# Services: Postgres (logical WAL), Redis, Kafka (KRaft) + Schema Registry,
# Debezium Connect, OpenSearch (+Dashboards), Keycloak, Kong (DB-less), MinIO.
# Observability services (otel-collector/prometheus/grafana/tempo) and the
# platform-reference app are added by Plans 04 and 03 respectively.

name: livora

networks:
  livora-net:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  kafka-data:
  opensearch-data:
  minio-data:
  tempo-data:
  grafana-data:

services:
  # ──────────────────────────────── Data ────────────────────────────────
  postgres:
    image: postgres:16
    container_name: livora-postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-livora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-livora_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-livora}
      POSTGRES_REPL_USER: ${POSTGRES_REPL_USER:-debezium}
      POSTGRES_REPL_PASSWORD: ${POSTGRES_REPL_PASSWORD:-debezium_dev_pw}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [livora-net]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-livora} -d ${POSTGRES_DB:-livora}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: livora-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    networks: [livora-net]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 10

  # ─────────────────────────────── Eventing ───────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: livora-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-Mk3OEYBSD34fcwNTJ2j0Tw}
    ports:
      - '${KAFKA_PORT:-9092}:9092'
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks: [livora-net]
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics --bootstrap-server localhost:9092 --list || exit 1']
      interval: 15s
      timeout: 10s
      retries: 15

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: livora-schema-registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - '${SCHEMA_REGISTRY_PORT:-8081}:8081'
    networks: [livora-net]
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8081/subjects || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

  connect:
    image: debezium/connect:2.7.3.Final
    container_name: livora-connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: livora-connect
      CONFIG_STORAGE_TOPIC: _connect_configs
      OFFSET_STORAGE_TOPIC: _connect_offsets
      STATUS_STORAGE_TOPIC: _connect_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: 'false'
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: 'false'
    env_file:
      - ./infra/debezium/connect-config.env
    ports:
      - '${CONNECT_PORT:-8083}:8083'
    networks: [livora-net]
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8083/connectors || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

  # ──────────────────────────────── Search ────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: livora-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: 'true'
      DISABLE_SECURITY_PLUGIN: 'true'
      DISABLE_INSTALL_DEMO_CONFIG: 'true'
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - '${OPENSEARCH_PORT:-9200}:9200'
    volumes:
      - opensearch-data:/usr/share/opensearch/data
      - ./infra/opensearch/opensearch.yml:/usr/share/opensearch/config/opensearch.yml:ro
    networks: [livora-net]
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:9200/_cluster/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 15

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.15.0
    container_name: livora-opensearch-dashboards
    restart: unless-stopped
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: 'true'
    ports:
      - '${OPENSEARCH_DASHBOARDS_PORT:-5601}:5601'
    networks: [livora-net]

  # ──────────────────────────────── Identity ──────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: livora-keycloak
    restart: unless-stopped
    # token-exchange enables OTP->token issuance (identity-service); admin-fine-grained-authz
    # is needed to grant the identity-admin client impersonation permission.
    command: ['start-dev', '--import-realm', '--features=token-exchange,admin-fine-grained-authz']
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_dev_pw}
      KC_HEALTH_ENABLED: 'true'
      KC_METRICS_ENABLED: 'true'
      KC_HTTP_ENABLED: 'true'
    ports:
      - '${KEYCLOAK_PORT:-8080}:8080'
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    networks: [livora-net]
    healthcheck:
      test:
        - CMD-SHELL
        - "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\nhost: localhost\\nConnection: close\\n\\n' >&3 && cat <&3 | grep -q '200 OK'"
      interval: 15s
      timeout: 5s
      retries: 20

  # ─────────────────────────────── Gateway ────────────────────────────────
  kong:
    image: kong:3.7
    container_name: livora-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    ports:
      - '${KONG_PROXY_PORT:-8000}:8000'
      - '${KONG_ADMIN_PORT:-8001}:8001'
    volumes:
      # Mount the DIRECTORY (not the single file): a single-file bind mount pins
      # the original inode, so git-pull file replacements aren't seen by the
      # container. Directory mount reflects updates; `kong reload` then works.
      - ./infra/kong:/kong:ro
    networks: [livora-net]
    healthcheck:
      test: ['CMD', 'kong', 'health']
      interval: 15s
      timeout: 5s
      retries: 10

  # ───────────────────────────── Object storage ───────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    container_name: livora-minio
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-livora}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-livora_dev_pw}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data
    networks: [livora-net]
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:9000/minio/health/ready || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

  # ─────────────────────────── Reference service ──────────────────────────
  platform-reference:
    build:
      context: .
      dockerfile: apps/platform-reference/Dockerfile
    image: livora/platform-reference:latest
    container_name: livora-platform-reference
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started
      otel-collector:
        condition: service_started
    environment:
      NODE_ENV: production
      SERVICE_NAME: platform-reference
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-livora}:${POSTGRES_PASSWORD:-livora_dev_pw}@postgres:5432/${POSTGRES_DB:-livora}?schema=public
      KAFKA_BROKERS: kafka:29092
      KAFKA_CONSUMER_GROUP: platform-reference
      DEMO_TOPIC: livora.demo.events
      DEMO_DLQ_TOPIC: livora.demo.events.DLQ
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: livora
      # Empty = don't enforce aud (Keycloak public-client tokens carry no aud).
      JWT_AUDIENCE: ""
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - '${PLATFORM_REFERENCE_PORT:-3000}:3000'
    networks: [livora-net]
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3000/health/live || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

  # ─────────────────────────── Identity service ───────────────────────────
  identity-service:
    build:
      context: .
      dockerfile: apps/identity-service/Dockerfile
    image: livora/identity-service:latest
    container_name: livora-identity-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      NODE_ENV: production
      SERVICE_NAME: identity-service
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-livora}:${POSTGRES_PASSWORD:-livora_dev_pw}@postgres:5432/identity?schema=public
      KAFKA_BROKERS: kafka:29092
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: livora
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-identity-admin}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-identity-admin-dev-secret}
      DEFAULT_CUSTOMER_ROLE: customer
      REDIS_URL: redis://redis:6379
      JWT_AUDIENCE: ""
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY:-}
      MSG91_SENDER_ID: ${MSG91_SENDER_ID:-}
      MSG91_OTP_TEMPLATE_ID: ${MSG91_OTP_TEMPLATE_ID:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    networks: [livora-net]
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3000/health/live || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

  # ───────────────────────────── User service ─────────────────────────────
  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    image: livora/user-service:latest
    container_name: livora-user-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started
      otel-collector:
        condition: service_started
    environment:
      NODE_ENV: production
      SERVICE_NAME: user-service
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-livora}:${POSTGRES_PASSWORD:-livora_dev_pw}@postgres:5432/users?schema=public
      KAFKA_BROKERS: kafka:29092
      KAFKA_CONSUMER_GROUP: user-service
      USER_REGISTERED_TOPIC: livora.user.events
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: livora
      JWT_AUDIENCE: ""
      GEOCODING_PROVIDER: ${GEOCODING_PROVIDER:-google}
      GEOCODING_API_KEY: ${GEOCODING_API_KEY:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    networks: [livora-net]
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3000/health/live || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

  # ───────────────────────────── Store service ────────────────────────────
  store-service:
    build:
      context: .
      dockerfile: apps/store-service/Dockerfile
    image: livora/store-service:latest
    container_name: livora-store-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started
      otel-collector:
        condition: service_started
    environment:
      NODE_ENV: production
      SERVICE_NAME: store-service
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-livora}:${POSTGRES_PASSWORD:-livora_dev_pw}@postgres:5432/stores?schema=public
      KAFKA_BROKERS: kafka:29092
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: livora
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-identity-admin}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-identity-admin-dev-secret}
      JWT_AUDIENCE: ""
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    networks: [livora-net]
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3000/health/live || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

  # ──────────────────────────── Catalog service ───────────────────────────
  catalog-service:
    build:
      context: .
      dockerfile: apps/catalog-service/Dockerfile
    image: livora/catalog-service:latest
    container_name: livora-catalog-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started
      minio:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      NODE_ENV: production
      SERVICE_NAME: catalog-service
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-livora}:${POSTGRES_PASSWORD:-livora_dev_pw}@postgres:5432/catalog?schema=public
      KAFKA_BROKERS: kafka:29092
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: livora
      JWT_AUDIENCE: ""
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-livora-catalog}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-livora}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-livora_dev_pw}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    networks: [livora-net]
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3000/health/live || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

  # ──────────────────────────── Observability ─────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: livora-otel-collector
    restart: unless-stopped
    command: ['--config=/etc/otel/config.yaml']
    volumes:
      - ./infra/observability/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - '${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317'
      - '${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318'
    networks: [livora-net]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: livora-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    networks: [livora-net]

  tempo:
    image: grafana/tempo:2.6.0
    container_name: livora-tempo
    restart: unless-stopped
    command: ['-config.file=/etc/tempo/tempo.yaml']
    volumes:
      - ./infra/observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - '${TEMPO_PORT:-3200}:3200'
    networks: [livora-net]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: livora-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - tempo
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infra/observability/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./infra/observability/grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./infra/observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - '${GRAFANA_PORT:-3001}:3000'
    networks: [livora-net]
