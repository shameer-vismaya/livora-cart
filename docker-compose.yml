# Livora Cart — full local infrastructure stack.
# One command: `make up`. Runtime-verified on the Ubuntu host (see deploy/).
#
# Services: Postgres (logical WAL), Redis, Kafka (KRaft) + Schema Registry,
# Debezium Connect, OpenSearch (+Dashboards), Keycloak, Kong (DB-less), MinIO.
# Observability services (otel-collector/prometheus/grafana/tempo) and the
# platform-reference app are added by Plans 04 and 03 respectively.

name: livora

networks:
  livora-net:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  kafka-data:
  opensearch-data:
  minio-data:

services:
  # ──────────────────────────────── Data ────────────────────────────────
  postgres:
    image: postgres:16
    container_name: livora-postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-livora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-livora_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-livora}
      POSTGRES_REPL_USER: ${POSTGRES_REPL_USER:-debezium}
      POSTGRES_REPL_PASSWORD: ${POSTGRES_REPL_PASSWORD:-debezium_dev_pw}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [livora-net]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-livora} -d ${POSTGRES_DB:-livora}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: livora-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    networks: [livora-net]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 10

  # ─────────────────────────────── Eventing ───────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: livora-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-Mk3OEYBSD34fcwNTJ2j0Tw}
    ports:
      - '${KAFKA_PORT:-9092}:9092'
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks: [livora-net]
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics --bootstrap-server localhost:9092 --list || exit 1']
      interval: 15s
      timeout: 10s
      retries: 15

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: livora-schema-registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - '${SCHEMA_REGISTRY_PORT:-8081}:8081'
    networks: [livora-net]
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8081/subjects || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

  connect:
    image: debezium/connect:2.7.3.Final
    container_name: livora-connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: livora-connect
      CONFIG_STORAGE_TOPIC: _connect_configs
      OFFSET_STORAGE_TOPIC: _connect_offsets
      STATUS_STORAGE_TOPIC: _connect_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: 'false'
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: 'false'
    env_file:
      - ./infra/debezium/connect-config.env
    ports:
      - '${CONNECT_PORT:-8083}:8083'
    networks: [livora-net]
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8083/connectors || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

  # ──────────────────────────────── Search ────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: livora-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: 'true'
      DISABLE_SECURITY_PLUGIN: 'true'
      DISABLE_INSTALL_DEMO_CONFIG: 'true'
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - '${OPENSEARCH_PORT:-9200}:9200'
    volumes:
      - opensearch-data:/usr/share/opensearch/data
      - ./infra/opensearch/opensearch.yml:/usr/share/opensearch/config/opensearch.yml:ro
    networks: [livora-net]
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:9200/_cluster/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 15

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.15.0
    container_name: livora-opensearch-dashboards
    restart: unless-stopped
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: 'true'
    ports:
      - '${OPENSEARCH_DASHBOARDS_PORT:-5601}:5601'
    networks: [livora-net]

  # ──────────────────────────────── Identity ──────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: livora-keycloak
    restart: unless-stopped
    command: ['start-dev', '--import-realm']
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_dev_pw}
      KC_HEALTH_ENABLED: 'true'
      KC_METRICS_ENABLED: 'true'
      KC_HTTP_ENABLED: 'true'
    ports:
      - '${KEYCLOAK_PORT:-8080}:8080'
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    networks: [livora-net]
    healthcheck:
      test:
        - CMD-SHELL
        - "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\nhost: localhost\\nConnection: close\\n\\n' >&3 && cat <&3 | grep -q '200 OK'"
      interval: 15s
      timeout: 5s
      retries: 20

  # ─────────────────────────────── Gateway ────────────────────────────────
  kong:
    image: kong:3.7
    container_name: livora-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    ports:
      - '${KONG_PROXY_PORT:-8000}:8000'
      - '${KONG_ADMIN_PORT:-8001}:8001'
    volumes:
      - ./infra/kong/kong.yml:/kong/kong.yml:ro
    networks: [livora-net]
    healthcheck:
      test: ['CMD', 'kong', 'health']
      interval: 15s
      timeout: 5s
      retries: 10

  # ───────────────────────────── Object storage ───────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    container_name: livora-minio
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-livora}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-livora_dev_pw}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data
    networks: [livora-net]
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:9000/minio/health/ready || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
