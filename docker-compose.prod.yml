# Production overrides for single-host Docker deployment.
# Used explicitly: docker compose -f docker-compose.yml -f docker-compose.prod.yml ...
# (docker-compose.override.yml is dev-only and NOT loaded in this combination).
#
# Philosophy: services talk over the `livora-net` Docker network by container
# name, so infra ports are NOT published to the host (avoids ALL host port
# conflicts on shared machines). The Kong proxy is the ONLY published port.
#   - Reference service:  http://<host>:8000/reference/...
#   - Keycloak realms:    http://<host>:8000/realms/...   (routed via Kong)
#   - UIs (Grafana etc.): SSH-tunnel to the container, or `docker compose port`.
# Kubernetes/DevSecOps is a later phase.
name: livora

services:
  postgres:
    restart: always
    ports: !reset []

  redis:
    restart: always
    ports: !reset []

  kafka:
    restart: always
    ports: !reset []

  schema-registry:
    restart: always
    ports: !reset []

  connect:
    restart: always
    ports: !reset []

  opensearch:
    restart: always
    ports: !reset []

  opensearch-dashboards:
    restart: always
    ports: !reset []

  keycloak:
    restart: always
    # Reached via Kong at /realms/* (token, certs, discovery). Not published.
    ports: !reset []

  kong:
    restart: always
    # The ONLY public entrypoint. Override KONG_PROXY_PORT if 8000 is taken.
    ports:
      - '${KONG_PROXY_PORT:-8000}:8000'

  minio:
    restart: always
    ports: !reset []

  platform-reference:
    restart: always
    ports: !reset []

  identity-service:
    restart: always
    ports: !reset []

  user-service:
    restart: always
    ports: !reset []

  store-service:
    restart: always
    ports: !reset []

  catalog-service:
    restart: always
    ports: !reset []

  otel-collector:
    restart: always
    ports: !reset []

  prometheus:
    restart: always
    ports: !reset []

  tempo:
    restart: always
    ports: !reset []

  grafana:
    restart: always
    ports: !reset []
