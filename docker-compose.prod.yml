# Production overrides for single-host Docker deployment.
# Used explicitly: docker compose -f docker-compose.yml -f docker-compose.prod.yml ...
# (docker-compose.override.yml is dev-only and NOT loaded in this combination).
#
# Philosophy: services talk over the `livora-net` Docker network by container
# name, so infra ports are NOT published to the host (avoids port conflicts on
# shared hosts). Only the Kong proxy is public; a few UIs bind to 127.0.0.1 for
# on-host debugging / token fetch (reach them via SSH tunnel).
# Kubernetes/DevSecOps is a later phase.
name: livora

services:
  postgres:
    restart: always
    ports: !reset []

  redis:
    restart: always
    ports: !reset []

  kafka:
    restart: always
    ports: !reset []

  schema-registry:
    restart: always
    ports: !reset []

  connect:
    restart: always
    ports: !reset []

  opensearch:
    restart: always
    ports: !reset []

  opensearch-dashboards:
    restart: always
    ports:
      - '127.0.0.1:${OPENSEARCH_DASHBOARDS_PORT:-5601}:5601'

  keycloak:
    restart: always
    # Bound to localhost for on-host token fetch; front behind a reverse proxy in real prod.
    ports:
      - '127.0.0.1:${KEYCLOAK_PORT:-8080}:8080'

  kong:
    restart: always
    # Proxy is the only public entrypoint; admin stays on localhost.
    ports:
      - '${KONG_PROXY_PORT:-8000}:8000'
      - '127.0.0.1:${KONG_ADMIN_PORT:-8001}:8001'

  minio:
    restart: always
    ports:
      - '127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001'

  platform-reference:
    restart: always
    # Reached through Kong (/reference); not published directly.
    ports: !reset []

  otel-collector:
    restart: always
    ports: !reset []

  prometheus:
    restart: always
    ports:
      - '127.0.0.1:${PROMETHEUS_PORT:-9090}:9090'

  tempo:
    restart: always
    ports: !reset []

  grafana:
    restart: always
    ports:
      - '127.0.0.1:${GRAFANA_PORT:-3001}:3000'
