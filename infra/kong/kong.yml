# Kong declarative (DB-less) config. Loaded at boot via KONG_DECLARATIVE_CONFIG.
# Kong owns edge concerns: routing, rate-limiting, correlation ids.
# JWT enforcement is done by the service's KeycloakJwtGuard (full JWKS verify),
# so there is no public-key to inject here at deploy time. A future hardening
# step (Cloud/DevSecOps phase) can add the openid-connect plugin at the edge.
_format_version: '3.0'
_transform: true

services:
  - name: platform-reference
    url: http://platform-reference:3000
    routes:
      - name: reference
        paths:
          - /reference
        strip_path: true

plugins:
  - name: rate-limiting
    config:
      minute: 600
      policy: local
  - name: correlation-id
    config:
      header_name: X-Request-Id
      generator: uuid
      echo_downstream: true
