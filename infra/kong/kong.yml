# Kong declarative (DB-less) config. Loaded at boot via KONG_DECLARATIVE_CONFIG.
# Kong owns edge concerns: routing, rate-limiting, correlation ids. It is the
# only host-published service in prod, so it also fronts Keycloak's public
# realm endpoints (token, certs, discovery) at /realms/*.
# JWT enforcement is done by the service's KeycloakJwtGuard (full JWKS verify);
# a future hardening step can add the openid-connect plugin at the edge.
_format_version: '3.0'
_transform: true

services:
  - name: platform-reference
    url: http://platform-reference:3000
    routes:
      - name: reference
        paths:
          - /reference
        strip_path: true

  - name: identity-service
    url: http://identity-service:3000
    routes:
      - name: identity
        paths:
          - /identity
        strip_path: true

  - name: user-service
    url: http://user-service:3000
    routes:
      - name: users
        paths:
          - /users
        strip_path: true

  - name: keycloak-realms
    url: http://keycloak:8080
    routes:
      - name: keycloak-realms
        # Exposes only /realms/* (token, certs, discovery) — NOT the admin console.
        paths:
          - /realms
        strip_path: false

plugins:
  - name: rate-limiting
    config:
      minute: 600
      policy: local
  - name: correlation-id
    config:
      header_name: X-Request-Id
      generator: uuid
      echo_downstream: true
