global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Metrics forwarded by the OTel Collector (service OTLP metrics).
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  # Direct scrape of the reference service's prom-client endpoint.
  - job_name: platform-reference
    metrics_path: /metrics
    static_configs:
      - targets: ['platform-reference:3000']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
